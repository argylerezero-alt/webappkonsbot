<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обустройство комнаты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #room {
            position: relative;
            width: 100vw;
            height: calc(100vh - 140px);
            background: url('https://i.imgur.com/8vJ2Z3k.jpg') center/cover no-repeat; /* ← замени на свою комнату */
            overflow: hidden;
        }
        .item {
            position: absolute;
            width: 90px;
            cursor: move;
            user-select: none;
            touch-action: none;
        }
        #inventory {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 130px;
            background: rgba(0,0,0,0.85);
            display: flex;
            overflow-x: auto;
            padding: 10px;
            gap: 12px;
            z-index: 100;
        }
        .inv-item {
            width: 85px;
            height: 85px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 3px solid #444;
            border-radius: 12px;
            flex-shrink: 0;
            cursor: grab;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 200;
        }
        button {
            padding: 10px 18px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div onclick="openStarsShop()" style="cursor:pointer; color:#ffd700; font-weight:bold;">⭐ Магазин Stars</div>
        <button id="save-btn">💾 Сохранить комнату</button>
    </div>

    <div id="room"></div>

    <div id="inventory"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe.user?.id;
        let placedItems = [];
        let inventory = [];

        const allItems = [ // Добавляй сюда свои PNG
            {id:1, name:"Лампа", url:"https://i.imgur.com/abc123.png"},
            {id:2, name:"Кресло", url:"https://i.imgur.com/def456.png"},
            {id:3, name:"Картина", url:"https://i.imgur.com/ghi789.png"},
            {id:4, name:"Цветы", url:"https://i.imgur.com/jkl012.png"},
            // ... добавляй сколько угодно
        ];

        async function loadRoom() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/load?user_id=${userId}`);
                const data = await res.json();
                placedItems = data.placed || [];
                inventory = data.inventory || allItems.slice(0, 5);
                renderRoom();
                renderInventory();
            } catch(e) { console.error(e); }
        }

        function renderRoom() {
            const room = document.getElementById('room');
            room.innerHTML = '';
            placedItems.forEach((item, i) => {
                const img = document.createElement('img');
                img.src = item.url;
                img.className = 'item';
                img.style.left = item.x + 'px';
                img.style.top = item.y + 'px';
                makeDraggable(img, i);
                room.appendChild(img);
            });
        }

        function renderInventory() {
            const inv = document.getElementById('inventory');
            inv.innerHTML = '';
            inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'inv-item';
                div.style.backgroundImage = `url(${item.url})`;
                div.draggable = true;
                div.ondragstart = e => e.dataTransfer.setData('text/plain', JSON.stringify(item));
                inv.appendChild(div);
            });
        }

        function makeDraggable(el, index) {
            let offsetX, offsetY;
            el.onpointerdown = e => {
                offsetX = e.clientX - el.getBoundingClientRect().left;
                offsetY = e.clientY - el.getBoundingClientRect().top;
                document.onpointermove = drag;
                document.onpointerup = () => document.onpointermove = null;
            };

            function drag(e) {
                let x = e.clientX - offsetX;
                let y = e.clientY - offsetY;
                x = Math.max(0, Math.min(x, window.innerWidth - 90));
                y = Math.max(0, Math.min(y, window.innerHeight - 200));
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                placedItems[index].x = x;
                placedItems[index].y = y;
            }
        }

        const room = document.getElementById('room');
        room.ondragover = e => e.preventDefault();
        room.ondrop = e => {
            e.preventDefault();
            const item = JSON.parse(e.dataTransfer.getData('text/plain'));
            const rect = room.getBoundingClientRect();
            const x = e.clientX - rect.left - 45;
            const y = e.clientY - rect.top - 45;

            placedItems.push({id: item.id, url: item.url, x: Math.max(0,x), y: Math.max(0,y)});
            renderRoom();
        };

        document.getElementById('save-btn').onclick = async () => {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, placed: placedItems, inventory: inventory})
            });
            tg.showPopup({message: 'Комната сохранена ✓'});
        };

        function openStarsShop() {
            tg.openInvoice('stars_item'); // будет обрабатываться в боте
        }

        window.onload = loadRoom;
    </script>
</body>
</html>
